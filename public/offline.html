<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0891b2" />
    <title>Offline — Nevajobs</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        font-family: system-ui, sans-serif;
        background: linear-gradient(to bottom, #f0f9ff, #fff);
        color: #0f172a;
        text-align: center;
      }
      .logo {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.25rem;
        border-radius: 1rem;
        background: linear-gradient(135deg, #06b6d4, #0284c7);
        color: #fff;
        font-size: 2rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
      p { color: #64748b; font-size: 0.9375rem; line-height: 1.5; max-width: 20rem; margin: 0 auto 1.5rem; }
      a {
        display: inline-block;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        background: linear-gradient(to right, #06b6d4, #0284c7);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="logo">N</div>
      <h1>You&apos;re offline</h1>
      <p>Check your connection and try again. Cached pages may still be available.</p>
      <a href="/">Retry</a>
    </div>
  </body>
</html>
